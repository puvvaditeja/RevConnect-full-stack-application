<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — RevConnect</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<style>
.password-wrapper { position: relative; }
.eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    background: none;
    border: none;
    padding: 0;
    color: var(--text-muted);
}
.field-error {
    color: #e53935;
    font-size: 12px;
    margin-top: 4px;
    display: none;
}
.pass-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
}
.pass-hint span {
    display: inline-block;
    margin-right: 8px;
    opacity: 0.5;
}
.pass-hint span.ok {
    opacity: 1;
    color: #2e7d32;
}
</style>

<script>
function toggleFields() {
    let type = document.getElementById("accountType").value;
    document.getElementById("creatorFields").style.display = "none";
    document.getElementById("businessFields").style.display = "none";
    if (type === "CREATOR") document.getElementById("creatorFields").style.display = "block";
    if (type === "BUSINESS") document.getElementById("businessFields").style.display = "block";
}

function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
    } else {
        input.type = 'password';
        btn.textContent = '👁';
    }
}

function checkPasswordStrength() {
    const val = document.getElementById('password').value;
    document.getElementById('hint-len').classList.toggle('ok', val.length >= 8);
    document.getElementById('hint-upper').classList.toggle('ok', /[A-Z]/.test(val));
    document.getElementById('hint-lower').classList.toggle('ok', /[a-z]/.test(val));
    document.getElementById('hint-digit').classList.toggle('ok', /\d/.test(val));
    document.getElementById('hint-special').classList.toggle('ok', /[@$!%*?&]/.test(val));
}

function validateRegister() {
    let valid = true;

    const email = document.getElementById('regEmail').value.trim();
    const emailPattern = /^[a-zA-Z0-9._%+\-]+@(gmail|yahoo|outlook|hotmail|icloud|revature|live|protonmail)\.[a-zA-Z]{2,}$/i;
    const emailError = document.getElementById('regEmailError');
    if (!emailPattern.test(email)) {
        emailError.style.display = 'block';
        valid = false;
    } else {
        emailError.style.display = 'none';
    }

    const password = document.getElementById('password').value;
    const passPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
    const passError = document.getElementById('regPasswordError');
    if (!passPattern.test(password)) {
        passError.style.display = 'block';
        valid = false;
    } else {
        passError.style.display = 'none';
    }

    return valid;
}
</script>
</head>

<body>
<div class="auth-container">
<div class="auth-card" style="max-width:520px;">
<div class="auth-logo">Create Account</div>
<p class="auth-tagline">Join RevConnect today.</p>

<div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

<form th:action="@{/register}" method="post" th:object="${user}" onsubmit="return validateRegister()">

<div class="form-group">
    <label class="form-label">Username</label>
    <input class="form-control" type="text" name="userName"
           th:value="*{userName}" placeholder="yourname" required/>
</div>

<div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-control" type="text" id="regEmail" name="email"
           th:value="*{email}" placeholder="you@gmail.com" required/>
    <div class="field-error" id="regEmailError">
        Enter a valid email — e.g. you@gmail.com, you@yahoo.com, you@outlook.com
    </div>
</div>

<div class="form-group">
    <label class="form-label">Password</label>
    <div class="password-wrapper">
        <input class="form-control" type="password" id="password" name="password"
               placeholder="Choose a strong password" required
               oninput="checkPasswordStrength()"/>
        <button type="button" class="eye-btn" onclick="togglePassword('password', this)">👁</button>
    </div>
    <div class="pass-hint">
        <span id="hint-len">✔ 8+ chars</span>
        <span id="hint-upper">✔ Uppercase</span>
        <span id="hint-lower">✔ Lowercase</span>
        <span id="hint-digit">✔ Digit</span>
        <span id="hint-special">✔ Special (@$!%*?&)</span>
    </div>
    <div class="field-error" id="regPasswordError">
        Password must meet all the requirements shown above.
    </div>
</div>

<div class="form-group">
    <label class="form-label">Account Type</label>
    <select class="form-control" id="accountType" name="accountType" onchange="toggleFields()" required>
        <option value="">— Select type —</option>
        <option th:each="type : ${accountTypes}" th:value="${type}" th:text="${type}"></option>
    </select>
</div>

<!-- CREATOR FIELDS -->
<div id="creatorFields" style="display:none;">
    <div class="form-group">
        <label class="form-label">Creator Name</label>
        <input class="form-control" type="text" name="creatorName"/>
    </div>
    <div class="form-group">
        <label class="form-label">Category / Industry</label>
        <input class="form-control" type="text" name="category"/>
    </div>
    <div class="form-group">
        <label class="form-label">Detailed Bio</label>
        <textarea class="form-control" name="bio"></textarea>
    </div>
    <div class="form-group">
        <label class="form-label">Contact Information</label>
        <input class="form-control" type="text" name="contactInfo"/>
    </div>
    <div class="form-group">
        <label class="form-label">Website</label>
        <input class="form-control" type="text" name="websiteLink"/>
    </div>
    <div class="form-group">
        <label class="form-label">Social Media Links</label>
        <input class="form-control" type="text" name="socialLink"/>
    </div>
</div>

<!-- BUSINESS FIELDS -->
<div id="businessFields" style="display:none;">
    <div class="form-group">
        <label class="form-label">Business Name</label>
        <input class="form-control" type="text" name="businessName"/>
    </div>
    <div class="form-group">
        <label class="form-label">Category / Industry</label>
        <input class="form-control" type="text" name="category"/>
    </div>
    <div class="form-group">
        <label class="form-label">Detailed Bio</label>
        <textarea class="form-control" name="bio"></textarea>
    </div>
    <div class="form-group">
        <label class="form-label">Contact Information</label>
        <input class="form-control" type="text" name="contactInfo"/>
    </div>
    <div class="form-group">
        <label class="form-label">Website</label>
        <input class="form-control" type="text" name="websiteLink"/>
    </div>
    <div class="form-group">
        <label class="form-label">Social Media Links</label>
        <input class="form-control" type="text" name="socialLink"/>
    </div>
    <div class="form-group">
        <label class="form-label">Business Address</label>
        <input class="form-control" type="text" name="businessAddress"/>
    </div>
    <div class="form-group">
        <label class="form-label">Business Hours</label>
        <input class="form-control" type="text" name="businessHours"/>
    </div>
</div>

<div class="form-group">
    <label class="form-label">Security Question</label>
    <select class="form-control" name="securityQuestion" required>
        <option value="">— Select a question —</option>
        <option th:each="sq : ${securityQuestions}" th:value="${sq}" th:text="${sq.question}"></option>
    </select>
</div>

<div class="form-group">
    <label class="form-label">Security Answer</label>
    <input class="form-control" type="text" name="securityAnswer" required/>
</div>

<button class="btn btn-primary" type="submit" style="width:100%;margin-top:8px;">
    Create Account
</button>

</form>

<div class="auth-divider">or</div>

<div style="text-align:center;font-size:14px;color:var(--text-secondary);">
    Already have an account?
    <a th:href="@{/login}" style="font-weight:600;">Log In</a>
</div>

</div>
</div>
</body>
</html>
