<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Post — RevConnect</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="topbar">
    <a class="topbar-brand" th:href="@{/feed(userId=${userId})}">RevConnect</a>
    <div class="topbar-actions">
        <a class="topbar-btn" th:href="@{/feed(userId=${userId})}">🏠 Feed</a>
        <a class="topbar-btn" th:href="@{/notifications(userId=${userId})}">🔔</a>
        <a class="topbar-btn" th:href="@{/logout}">Logout</a>
    </div>
</nav>

<div style="max-width:680px;margin:24px auto;padding:0 20px;">

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>

    <!-- Post detail card -->
    <div class="post-card" th:if="${post != null}">
        <div class="post-header">
            <div class="avatar-sm"
                 th:text="${post.userName != null ? post.userName.substring(0,1) : 'U'}">U</div>
            <div class="post-header-info">
                <div class="post-author" th:text="${post.userName}">Username</div>
                <div class="post-time"
                     th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'MMM d, yyyy · h:mm a') : ''}"></div>
            </div>
        </div>

        <div class="post-body">
            <div class="shared-badge" th:if="${post.shared}">
                🔁 Shared post
                <a th:if="${post.originalPostId != null}"
                   th:href="@{/posts/{id}(id=${post.originalPostId}, userId=${userId})}">View original</a>
            </div>

            <img class="post-image"
                 th:if="${post.imageUrl != null and !post.imageUrl.isEmpty()}"
                 th:src="${post.imageUrl}" th:alt="${post.content}"/>

            <p class="post-content" th:text="${post.content}">Post content</p>

            <div th:if="${post.ctaLabel != null and !post.ctaLabel.isEmpty()}"
     style="margin-top:12px;">
    <a th:href="${post.ctaLink}"
       th:text="${post.ctaLabel}"
       target="_blank"
       class="btn btn-primary btn-sm">
    </a>
</div>
        </div>

        <!-- Engagement summary -->
        <div style="padding:8px 20px;font-size:13px;color:var(--text-muted);border-top:1px solid var(--border);">
            <span th:text="${likeCount} + ' likes'">0 likes</span>
            ·
            <span th:text="${#lists.size(comments)} + ' comments'">0 comments</span>
        </div>

        <!-- Like action -->
        <div class="post-actions">
            <div class="like-btn-wrapper">
                <input type="checkbox" class="like-checkbox"
                       th:id="'like-chk-detail'"
                       th:checked="${likedByUser}"/>
                <label class="like-label" for="like-chk-detail"
                       th:classappend="${likedByUser} ? 'liked' : ''"
                       th:onclick="document.getElementById('like-form-detail').submit()">
                    <span class="heart">❤️</span>
                    <span th:text="${likedByUser} ? 'Unlike' : 'Like'">Like</span>
                </label>
            </div>

            <form id="like-form-detail"
                  th:action="${likedByUser} ? @{/posts/{id}/unlike(id=${post.postId})} : @{/posts/{id}/like(id=${post.postId})}"
                  method="post" style="display:none;">
                <input type="hidden" name="userId" th:value="${userId}"/>
            </form>

            <form th:action="@{/posts/{id}/share(id=${post.postId})}" method="post" style="display:inline;">
                <input type="hidden" name="userId" th:value="${userId}"/>
                <button type="submit" class="action-btn">↗️ Share</button>
            </form>

            <form th:action="@{/posts/{id}/save(id=${post.postId})}" method="post" style="display:inline;">
                <input type="hidden" name="userId" th:value="${userId}"/>
                <button type="submit" class="action-btn">🔖 Save</button>
            </form>
        </div>
    </div>

    <!-- Comments section -->
    <div class="card" style="margin-top:16px;">
        <div class="card-header">💬 Comments</div>
        <div class="card-body" style="padding:0;">

            <!-- Add comment form -->
            <form th:action="@{/posts/{id}/comment(id=${post.postId})}" method="post"
                  style="padding:14px 20px;border-bottom:1px solid var(--border);">
                <input type="hidden" name="userId" th:value="${userId}"/>
                <div style="display:flex;gap:10px;align-items:flex-start;">
                    <div class="avatar-sm" style="margin-top:4px;">💬</div>
                    <textarea class="form-control" name="content"
                              placeholder="Write a comment…" rows="2"
                              style="flex:1;" required></textarea>
                </div>
                <div style="text-align:right;margin-top:8px;">
                    <button type="submit" class="btn btn-primary btn-sm">Post Comment</button>
                </div>
            </form>

            <!-- Comment list -->
            <div th:if="${comments == null or #lists.isEmpty(comments)}"
                 class="empty-state" style="padding:24px;">
                <p>Be the first to comment!</p>
            </div>

            <div class="comment-item" th:each="comment : ${comments}">
                <div class="avatar-sm"
                     th:text="${comment.userName != null ? comment.userName.substring(0,1) : 'U'}">U</div>
                <div class="comment-body" style="flex:1;">
                    <div class="comment-author" th:text="${comment.userName}">Author</div>
                    <div class="comment-text" th:text="${comment.content}">Comment text</div>
                    <div class="comment-time"
                         th:text="${comment.createdAt != null ? #temporals.format(comment.createdAt, 'MMM d, h:mm a') : ''}"></div>

                    <!-- Reply toggle button -->
                    <button type="button" class="action-btn"
                            style="font-size:12px;margin-top:6px;color:var(--text-muted);"
                            th:onclick="'toggleReply(' + ${comment.commentId} + ')'">💬 Reply</button>

                    <!-- Inline reply form (hidden by default) -->
                    <form th:id="'reply-form-' + ${comment.commentId}"
                          th:action="@{/posts/comments/{cid}/reply(cid=${comment.commentId})}"
                          method="post"
                          style="display:none; margin-top:8px;">
                        <input type="hidden" name="userId"  th:value="${userId}"/>
                        <input type="hidden" name="postId"  th:value="${post.postId}"/>
                        <div style="display:flex;gap:8px;align-items:flex-start;">
                            <textarea class="form-control" name="content"
                                      placeholder="Write a reply…" rows="2"
                                      style="flex:1;font-size:13px;" required></textarea>
                            <button type="submit" class="btn btn-primary btn-sm">Send</button>
                        </div>
                    </form>

                    <!-- Nested replies -->
                    <div th:if="${comment.replies != null and !#lists.isEmpty(comment.replies)}"
                         style="margin-top:10px;padding-left:16px;border-left:2px solid var(--border);">
                        <div class="comment-item" th:each="reply : ${comment.replies}"
                             style="margin-bottom:8px;">
                            <div class="avatar-sm"
                                 th:text="${reply.userName != null ? reply.userName.substring(0,1) : 'U'}"
                                 style="width:28px;height:28px;font-size:12px;">U</div>
                            <div class="comment-body">
                                <div class="comment-author" th:text="${reply.userName}">Author</div>
                                <div class="comment-text"   th:text="${reply.content}">Reply text</div>
                                <div class="comment-time"
                                     th:text="${reply.createdAt != null ? #temporals.format(reply.createdAt, 'MMM d, h:mm a') : ''}"></div>
                            </div>
                            <!-- Delete reply (only owner) -->
                            <form th:if="${reply.userId == userId}"
                                  th:action="@{/posts/comments/{cid}/delete(cid=${reply.commentId})}"
                                  method="post" style="display:inline;align-self:center;">
                                <input type="hidden" name="userId" th:value="${userId}"/>
                                <input type="hidden" name="postId" th:value="${post.postId}"/>
                                <button type="submit" class="action-btn btn-sm"
                                        style="color:var(--text-muted);font-size:12px;" title="Delete reply">✕</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Delete comment (only visible to comment owner) -->
                <form th:if="${comment.userId == userId}"
                      th:action="@{/posts/comments/{cid}/delete(cid=${comment.commentId})}"
                      method="post" style="display:inline;align-self:flex-start;margin-top:4px;">
                    <input type="hidden" name="userId" th:value="${userId}"/>
                    <input type="hidden" name="postId" th:value="${post.postId}"/>
                    <button type="submit" class="action-btn btn-sm"
                            style="color:var(--text-muted);font-size:12px;"
                            title="Delete comment">✕</button>
                </form>
            </div>

        </div>
    </div>

    <div style="margin-top:16px;">
        <a class="btn btn-outline btn-sm" th:href="@{/feed(userId=${userId})}">← Back to Feed</a>
    </div>

</div>

<script>
function toggleReply(commentId) {
    const form = document.getElementById('reply-form-' + commentId);
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
}
</script>
</body>
</html>
