<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Profile — RevConnect</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="topbar">
    <a class="topbar-brand" th:href="@{/feed(userId=${userId})}">RevConnect</a>
    <div class="topbar-actions">
        <a class="topbar-btn" th:href="@{/feed(userId=${userId})}">🏠 Feed</a>
        <a class="topbar-btn" th:href="@{/notifications(userId=${userId})}">🔔</a>
        <a class="topbar-btn" th:href="@{/logout}">Logout</a>
    </div>
</nav>

<div class="layout">

    <aside class="sidebar">
        <div class="card">
            <nav class="nav-menu">
                <a class="nav-item" th:href="@{/feed(userId=${userId})}">
                    <span class="nav-icon">🏠</span> Home
                </a>
                <a class="nav-item active" th:href="@{/profile(userId=${userId})}">
                    <span class="nav-icon">👤</span> My Profile
                </a>
                <a class="nav-item" th:href="@{/posts/saved(userId=${userId})}">
                    <span class="nav-icon">🔖</span> Saved Posts
                </a>
                <a class="nav-item" th:href="@{/notifications(userId=${userId})}">
                    <span class="nav-icon">🔔</span> Notifications
                </a>
                <a class="nav-item" th:href="@{/follow/followers(userId=${userId})}">
                    <span class="nav-icon">👥</span> Followers
                </a>
                <a class="nav-item" th:href="@{/follow/following(userId=${userId})}">
                    <span class="nav-icon">➕</span> Following
                </a>
                <a class="nav-item" th:href="@{/mvc/connections(userId=${userId})}">
                    <span class="nav-icon">🔗</span> Connections
                </a>
            </nav>
        </div>
    </aside>

    <main class="feed-column">

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="alert alert-danger" th:if="${privateAccountMessage}" th:text="${privateAccountMessage}"></div>

        <div class="card" th:if="${profile != null}">
            <div class="profile-cover"></div>
            <div class="profile-info-section">
                <div class="profile-avatar-wrap">
                    <div class="avatar-lg"
                         th:if="${profile.profilePic == null or profile.profilePic.isEmpty()}"
                         th:text="${profile.userName != null ? profile.userName.substring(0,1) : 'U'}">U</div>
                    <img class="avatar-lg"
                         th:if="${profile.profilePic != null and !profile.profilePic.isEmpty()}"
                         th:src="${profile.profilePic}" th:alt="${profile.userName}"/>
                </div>

                <h1 class="profile-name"
                    th:text="${profile.name != null ? profile.name : profile.userName}">Name</h1>
                <p class="profile-bio" th:if="${profile.bio != null}" th:text="${profile.bio}"></p>
                <p class="profile-location" th:if="${profile.location != null}">
                    📍 <span th:text="${profile.location}"></span>
                </p>
                <p style="font-size:13px;color:var(--text-muted);margin-top:4px;"
                   th:if="${profile.websiteLink != null}">
                    🔗 <a th:href="${profile.websiteLink}" th:text="${profile.websiteLink}" target="_blank"></a>
                </p>

                <div class="profile-stats">
                    <div class="profile-stat">
                        <span class="num" th:text="${profile.totalPosts}">0</span>
                        <span class="lbl">Posts</span>
                    </div>
                    <a class="profile-stat" style="text-decoration:none;color:inherit;"
                       th:href="@{/follow/followers(userId=${profileUserId})}">
                        <span class="num" th:text="${profile.totalFollowers}">0</span>
                        <span class="lbl">Followers</span>
                    </a>
                    <a class="profile-stat" style="text-decoration:none;color:inherit;"
                       th:href="@{/follow/following(userId=${profileUserId})}">
                        <span class="num" th:text="${profile.totalFollowing}">0</span>
                        <span class="lbl">Following</span>
                    </a>
                    <div class="profile-stat">
                        <span class="num" th:text="${profile.totalShares}">0</span>
                        <span class="lbl">Shares</span>
                    </div>
                </div>

                <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">

                    <a th:if="${isOwnProfile}" class="btn btn-outline btn-sm"
                       th:href="@{/profile/edit(userId=${userId})}">✏️ Edit Profile</a>
                    <a th:if="${isOwnProfile}" class="btn btn-primary btn-sm"
                       th:href="@{/posts/create(userId=${userId})}">+ New Post</a>

                    <form th:if="${!isOwnProfile and !isFollowing}"
                          th:action="@{/follow/{id}(id=${profileUserId})}" method="post">
                        <input type="hidden" name="userId" th:value="${userId}"/>
                        <button type="submit" class="btn btn-primary btn-sm">Follow</button>
                    </form>
                    <form th:if="${!isOwnProfile and isFollowing}"
                          th:action="@{/follow/{id}/unfollow(id=${profileUserId})}" method="post">
                        <input type="hidden" name="userId" th:value="${userId}"/>
                        <button type="submit" class="btn btn-outline btn-sm">Unfollow</button>
                    </form>

                    <form th:if="${!isOwnProfile and connectionStatus == 'NONE'}"
                          th:action="@{/mvc/connections/send}" method="post">
                        <input type="hidden" name="senderId"   th:value="${userId}"/>
                        <input type="hidden" name="receiverId" th:value="${profileUserId}"/>
                        <button type="submit" class="btn btn-primary btn-sm">🤝 Connect</button>
                    </form>

                    <form th:if="${!isOwnProfile and connectionStatus == 'PENDING'}"
                          th:action="@{/mvc/connections/remove}" method="post">
                        <input type="hidden" name="userId"       th:value="${userId}"/>
                        <input type="hidden" name="targetUserId" th:value="${profileUserId}"/>
                        <button type="submit" class="btn btn-outline btn-sm">⏳ Withdraw Request</button>
                    </form>

                    <span th:if="${!isOwnProfile and connectionStatus == 'RECEIVED'}">
                        <form th:action="@{/mvc/connections/accept/{id}(id=${connectionId})}" method="post" style="display:inline;">
                            <input type="hidden" name="userId" th:value="${userId}"/>
                            <button type="submit" class="btn btn-primary btn-sm">✅ Accept</button>
                        </form>
                        <form th:action="@{/mvc/connections/reject/{id}(id=${connectionId})}" method="post" style="display:inline;">
                            <input type="hidden" name="userId" th:value="${userId}"/>
                            <button type="submit" class="btn btn-outline btn-sm">✕ Reject</button>
                        </form>
                    </span>

                    <form th:if="${!isOwnProfile and connectionStatus == 'ACCEPTED'}"
                          th:action="@{/mvc/connections/remove}" method="post">
                        <input type="hidden" name="userId"       th:value="${userId}"/>
                        <input type="hidden" name="targetUserId" th:value="${profileUserId}"/>
                        <button type="submit" class="btn btn-outline btn-sm">🔗 Connected · Remove</button>
                    </form>

                </div>
            </div>
        </div>

        <div th:if="${posts == null or posts.isEmpty()}" class="card">
            <div class="empty-state">
                <div class="icon">📝</div>
                <p>No posts yet.</p>
            </div>
        </div>

        <div class="post-card" th:each="post : ${posts}" th:id="'post-' + ${post.postId}">
            <div class="post-header">
                <div class="avatar-sm"
                     th:text="${post.userName != null ? post.userName.substring(0,1) : 'U'}">U</div>
                <div class="post-header-info">
                    <div class="post-author" th:text="${post.userName}">Username</div>
                    <div class="post-time"
                         th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'MMM d, yyyy · h:mm a') : ''}"></div>
                </div>
            </div>

            <div class="post-body">
                <img class="post-image"
                     th:if="${post.imageUrl != null and !post.imageUrl.isEmpty()}"
                     th:src="${post.imageUrl}" th:alt="${post.content}"/>
                <p class="post-content" th:text="${post.content}">Content</p>
                <a class="post-hashtag"
                   th:if="${post.hashtag != null and !post.hashtag.isEmpty()}"
                   th:href="@{/feed/search(keyword=${post.hashtag}, userId=${userId})}"
                   th:text="${post.hashtag}"></a>
            </div>

            <div class="post-actions">
                <div class="like-btn-wrapper">
                    <input type="checkbox" class="like-checkbox" th:id="'like-chk-' + ${post.postId}"/>
                    <label class="like-label" th:for="'like-chk-' + ${post.postId}"
                           th:onclick="'document.getElementById(\'like-form-\' + ' + ${post.postId} + ').submit()'">
                        <span class="heart">❤️</span> Like
                    </label>
                </div>
                <form th:id="'like-form-' + ${post.postId}"
                      th:action="@{/posts/{id}/like(id=${post.postId})}" method="post"
                      style="display:none;">
                    <input type="hidden" name="userId" th:value="${userId}"/>
                    <input type="hidden" name="redirectTo" th:value="@{/profile(userId=${userId},targetUserId=${profileUserId})}"/>
                </form>

                <a class="action-btn" th:href="@{/posts/{id}(id=${post.postId}, userId=${userId})}">
                    💬 Comment
                </a>

                <form th:if="${isOwnProfile}"
                      th:action="@{/posts/{id}/pin(id=${post.postId})}" method="post"
                      style="display:inline;">
                    <input type="hidden" name="userId" th:value="${userId}"/>
                    <button type="submit" class="action-btn">📌 Pin</button>
                </form>
                <form th:if="${isOwnProfile and post.pinned != null and post.pinned}"
                      th:action="@{/posts/{id}/unpin(id=${post.postId})}" method="post"
                      style="display:inline;">
                    <input type="hidden" name="userId" th:value="${userId}"/>
                    <button type="submit" class="action-btn">📌 Unpin</button>
                </form>

                <form th:if="${isOwnProfile}"
                      th:action="@{/posts/{id}/delete(id=${post.postId})}" method="post"
                      style="display:inline;"
                      onsubmit="return confirm('Delete this post?')">
                    <input type="hidden" name="userId" th:value="${userId}"/>
                    <button type="submit" class="action-btn" style="color:var(--danger);">🗑 Delete</button>
                </form>
            </div>
        </div>

    </main>

    <aside class="right-sidebar">
        <div class="card">
            <div class="card-body">
                <p style="font-size:14px;color:var(--text-secondary);">
                    <strong th:text="${profile != null ? (profile.name != null ? profile.name : profile.userName) : 'User'}"></strong>'s profile
                </p>
                <p style="font-size:13px;color:var(--text-muted);margin-top:6px;"
                   th:text="${profile != null ? profile.accountType : ''}"></p>
            </div>
        </div>
    </aside>

</div>

</body>
</html>
